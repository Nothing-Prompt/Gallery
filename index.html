<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Nothing • Archive</title>
<link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
<style>
    :root{ --bg:#050505; --card:#0e0e0e; --accent:#dfff2e; --error:#ff4d4d; }
    *{ margin:0; padding:0; box-sizing:border-box; text-decoration: none !important; }
    body{ font-family:'Space Grotesk',sans-serif; background:var(--bg); color:#fff; padding:0 6px 20px; overflow-x:hidden; }

    /* BACKGROUND */
    .bg-container { position:fixed; inset:0; z-index:-5; pointer-events:none; overflow:hidden; background: var(--bg); }
    .bg-gradient { position: absolute; inset: 0; background: radial-gradient(circle at 10% 10%, rgba(223, 255, 46, 0.1) 0%, transparent 40%), radial-gradient(circle at 90% 80%, rgba(223, 255, 46, 0.07) 0%, transparent 40%); filter: blur(80px); }
    .bg-x-grid { position: absolute; width: 200%; height: 200%; top: -50%; left: -50%; background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px); background-size: 80px 80px; transform: rotate(35deg); }

    .container{ width:100%; max-width:1000px; margin:auto; position: relative; }
    
    /* HEADER */
    .hero{ padding:35px 0 15px; display: flex; flex-direction: column; align-items: center; }
    .hero-box { display: flex; flex-direction: column; width: 100%; max-width: 320px; }
    .hero-top, .hero-bot { font-family: 'Syncopate', sans-serif; font-size: clamp(2rem, 12vw, 4rem); line-height: 0.9; font-weight: 700; letter-spacing: -1px; text-align: center; }
    .hero-mid { display: flex; align-items: center; width: 100%; margin: 10px 0; color: var(--accent); font-size: 0.55rem; }
    .hero-line { flex-grow: 1; height: 1.5px; background: var(--accent); opacity: 0.7; }
    .hero-mid span { padding: 0 12px; letter-spacing: 5px; font-family: 'Syncopate'; font-weight: 700; }
    
    .social-area { margin-top: 15px; display: flex; align-items: center; gap: 10px; font-size: 0.7rem; font-weight: 500; color: #444; text-transform: uppercase; letter-spacing: 1px; }
    .social-btn { color: #000; border: 1px solid var(--accent); padding: 6px 16px; border-radius: 8px; background: var(--accent); font-weight: 700; }

    .info-bar { margin-top: 20px; border: 1px dotted #333; padding: 4px 14px; border-radius: 10px; font-size: 0.65rem; color: #555; background: rgba(0,0,0,0.4); font-weight: 700; }
    .info-bar b { color: var(--accent); margin-right: 3px; }

    /* GRID */
    .feed{ margin-top:20px; display:grid; grid-template-columns:repeat(2,1fr); gap:8px; }
    .card{ background: var(--card); border: 1px solid #151515; border-radius:14px; overflow:hidden; opacity:0; transform: translateY(20px); transition: all 0.5s ease-out; }
    .card.show{ opacity:1; transform: translateY(0); }
    .card img{ width:100%; aspect-ratio:3/4; object-fit:cover; border-bottom: 1px solid #151515; display: block; opacity: 0.85; }
    
    .card-content{ padding:10px; }
    .card-title{ font-family: 'Space Grotesk', sans-serif; font-size:0.85rem; color:#fff; margin-bottom:10px; font-weight: 700; line-height: 1.2; text-transform: uppercase; height: 2.4em; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }

    /* --- SECURITY UI FIXED --- */
    .btn-group { display: flex; flex-direction: column; gap: 6px; }
    
    .lock-input { 
        display: none; width: 100%; height: 38px; background: #000 !important; border: 1px solid #333; 
        border-radius: 10px; color: var(--accent); text-align: center; font-weight: 700; 
        outline: none; font-size: 0.8rem; font-family: monospace; 
    }
    
    /* Tombol Default: Hitam */
    .view-btn { 
        width:100%; height:38px; border: 1px solid #222; border-radius:10px; 
        background-color: #000 !important; color: var(--accent) !important; 
        font-weight:700; font-size: 0.7rem; text-transform: uppercase; cursor:pointer; 
        transition: none; /* Matikan transisi biar gak kedip volt */
    }
    .view-btn:hover { background-color: #111 !important; }

    /* Class khusus saat sukses (Volt) */
    .view-btn.success {
        background-color: var(--accent) !important;
        color: #000 !important;
        border-color: var(--accent) !important;
    }

    /* Class khusus saat error (Hitam tetap, cuma teks merah) */
    .view-btn.error-state {
        color: var(--error) !important;
        border-color: var(--error) !important;
    }

    .pay-btn { display: none; width:100%; height:32px; border: 1px dotted #333; border-radius:10px; background: transparent; color: #444; font-weight:700; font-size: 0.55rem; text-transform: uppercase; cursor:pointer; }

    .footer { margin-top: 60px; padding: 40px 20px; text-align: center; color: var(--accent); font-size: 0.75rem; border-top: 1px solid #111; font-family: 'Syncopate', sans-serif; font-weight: 700; letter-spacing: 1px; }

    @media(min-width:900px){ .feed{ grid-template-columns:repeat(4,1fr); gap:10px; } }
</style>
</head>
<body>
<div class="bg-container"><div class="bg-gradient"></div><div class="bg-x-grid"></div></div>
<div class="container">
    <div class="hero">
        <div class="hero-box">
            <div class="hero-top">PROMPT</div>
            <div class="hero-mid"><div class="hero-line"></div><span>BY</span><div class="hero-line"></div></div>
            <div class="hero-bot">NOTHING</div>
        </div>
        <div class="social-area">
            <span>Sosial media</span><span class="social-dot">•</span>
            <a href="https://www.tiktok.com/@nothxie?_r=1&_t=ZS-96H0tpV7FFI" class="social-btn">TikTok</a>
        </div>
        <div class="info-bar"><b id="promptCount">0</b> prompt tersedia</div>
    </div>
    <div id="feed" class="feed">Decrypting Archive...</div>
    <footer class="footer">© Nothing • AI - Creator</footer>
</div>

<script>
const WA_NUMBER = "6285155296786"; 
const DATA_URL = "https://gist.githubusercontent.com/Nothing-Prompt/a15861e94f408c9d85c1b7f4c561c540/raw/2de16d758ca6929fa1accc6d7482867b90be8371/gistfile1.txt";

let promptStorage = {};
function initObserver() {
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('show'); });
    }, { threshold: 0.1 });
    document.querySelectorAll('.card').forEach(card => observer.observe(card));
}

async function loadData() {
    try {
        const res = await fetch(DATA_URL);
        const rawText = await res.text();
        const blocks = rawText.split('###').map(b => b.trim()).filter(b => b);
        document.getElementById("promptCount").innerText = blocks.length;
        const feed = document.getElementById("feed");
        feed.innerHTML = "";
        blocks.forEach((block, index) => {
            const lines = block.split('\n');
            let title = "UNTITLED", img = "", key = "", promptArr = [];
            let isPrompt = false;
            lines.forEach(line => {
                const c = line.trim();
                if (/^judul\s*:/i.test(c)) title = c.replace(/^judul\s*:/i, '').trim();
                else if (/^link gambar\s*:/i.test(c)) img = c.replace(/^link gambar\s*:/i, '').trim();
                else if (/^key\s*:/i.test(c)) key = c.replace(/^key\s*:/i, '').trim();
                else if (/^teks-prompt\s*:/i.test(c)) { isPrompt = true; promptArr.push(c.replace(/^teks-prompt\s*:/i, '').trim()); }
                else if (isPrompt) promptArr.push(line);
            });
            const id = `s_${index}`;
            promptStorage[id] = { k: key, t: promptArr.join('\n').trim(), title: title };
            feed.insertAdjacentHTML('beforeend', `
                <div class="card" id="card-${id}">
                    <img src="${img}" onerror="this.src='https://via.placeholder.com/300x400?text=Media+Locked'">
                    <div class="card-content">
                        <div class="card-title">${title}</div>
                        <div class="btn-group">
                            <input type="text" class="lock-input" id="input-${id}" placeholder="INPUT KEY">
                            <button class="view-btn" id="btn-${id}" onclick="handleSecureLogic('${id}')">Get Prompt</button>
                            <button class="pay-btn" id="pay-${id}" onclick="buyKey('${id}')">Purchase Key</button>
                        </div>
                    </div>
                </div>`);
        });
        setTimeout(initObserver, 100);
    } catch (e) { feed.innerHTML = "Error Database."; }
}

function handleSecureLogic(id) {
    const input = document.getElementById(`input-${id}`);
    const payBtn = document.getElementById(`pay-${id}`);
    const btn = document.getElementById(`btn-${id}`);
    const data = promptStorage[id];
    
    if (window.getComputedStyle(input).display === 'none') {
        input.style.display = 'block'; 
        payBtn.style.display = 'block'; 
        input.focus();
        btn.innerHTML = "Confirm Key"; 
        return;
    }

    const userIn = input.value.trim();
    if (!userIn) {
        btn.classList.add('error-state');
        btn.innerHTML = "Input Key!"; 
        setTimeout(() => { btn.classList.remove('error-state'); btn.innerHTML = "Confirm Key"; }, 1000); 
        return;
    }

    if (userIn === data.k) {
        // SUKSES
        const tx = document.createElement('textarea');
        tx.value = data.t; document.body.appendChild(tx); tx.select();
        document.execCommand('copy'); document.body.removeChild(tx);
        
        btn.classList.add('success');
        btn.innerHTML = "✓ COPIED"; 
        
        setTimeout(() => { 
            btn.classList.remove('success');
            btn.innerHTML = "Get Prompt"; 
            input.value = ""; 
        }, 1500);
    } else {
        // GAGAL
        btn.classList.add('error-state');
        btn.innerHTML = "Kode Salah!"; 
        setTimeout(() => { 
            btn.classList.remove('error-state');
            btn.innerHTML = "Confirm Key"; 
        }, 1200);
    }
}
function buyKey(id) { window.open(`https://wa.me/${WA_NUMBER}?text=Halo, saya mau beli key untuk: ${promptStorage[id].title}`, '_blank'); }
loadData();
</script>
</body>
</html>
