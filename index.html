<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Nothing • Archive</title>
<link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
<style>
    :root{ --bg:#050505; --accent:#dfff2e; --error:#ff4d4d; --charcoal: rgba(25, 25, 25, 0.8); --accent-trans: rgba(223, 255, 46, 0.2); --white-trans: rgba(255, 255, 255, 0.1); }
    *{ margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; text-decoration: none !important; }
    body{ font-family:'Space Grotesk',sans-serif; background:var(--bg); color:#fff; padding:0 6px 20px; overflow-x:hidden; }

    /* BACKGROUND ELEMENTS */
    .bg-container { position:fixed; inset:0; z-index:-5; pointer-events:none; overflow:hidden; background: var(--bg); }
    .bg-gradient { position: absolute; inset: 0; background: radial-gradient(circle at 10% 10%, rgba(223, 255, 46, 0.1) 0%, transparent 40%), radial-gradient(circle at 90% 80%, rgba(223, 255, 46, 0.05) 0%, transparent 40%); filter: blur(80px); }
    .bg-x-grid { position: absolute; width: 200%; height: 200%; top: -50%; left: -50%; background-image: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px); background-size: 60px 60px; transform: rotate(35deg); }
    .bg-dots { position: absolute; inset: 0; background-image: radial-gradient(rgba(255,255,255,0.04) 1px, transparent 1px); background-size: 25px 25px; }

    .container{ width:100%; max-width:700px; margin:auto; position: relative; }
    
    /* HEADER SECTION */
    .hero{ padding:30px 0 10px; display: flex; flex-direction: column; align-items: center; }
    .hero-top, .hero-bot { font-family: 'Syncopate', sans-serif; font-size: clamp(2.2rem, 11vw, 3.5rem); line-height: 1.1; font-weight: 700; letter-spacing: -1px; text-align: center; }
    .hero-mid { display: flex; align-items: center; width: 100%; max-width: 260px; margin: 10px 0; color: var(--accent); font-size: 0.5rem; }
    .hero-line { flex-grow: 1; height: 1.2px; background: var(--accent); opacity: 0.6; }
    .hero-mid span { padding: 0 10px; letter-spacing: 4px; font-family: 'Syncopate'; font-weight: 700; }
    .hero-sub { font-size: 0.5rem; font-weight: 800; letter-spacing: 3px; color: #444; text-transform: uppercase; margin-top: 4px; }

    /* SOCIAL AREA (TRANSPARENT BOX RESTORED) */
    .social-area-container { margin-top: 20px; display: flex; justify-content: center; width: 100%; }
    .social-box { 
        background: rgba(15, 15, 15, 0.5); 
        border: 1px solid var(--white-trans); 
        padding: 8px 16px; 
        border-radius: 10px; 
        backdrop-filter: blur(5px);
        display: flex; 
        align-items: center; 
        gap: 12px; 
        font-family: 'Syncopate', sans-serif; 
        font-size: 0.5rem; 
        font-weight: 700; 
        letter-spacing: 1px; 
        color: #555; 
    }
    .social-link { color: var(--accent); transition: 0.3s; cursor: pointer; text-transform: uppercase; }
    .social-link:hover { color: #fff; text-shadow: 0 0 5px var(--accent); }
    .social-divider { color: #222; font-weight: 300; }

    /* STATUS & NAV */
    .status-container { margin-top: 25px; display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .pagination { margin: 10px 0; display: flex; justify-content: center; align-items: center; gap: 12px; }
    .nav-btn { background:#000; color:var(--accent); width:35px; height:35px; border-radius:50%; border:1px solid var(--accent); cursor:pointer; font-weight:700; display:flex; align-items:center; justify-content:center; transition:0.3s; }
    .nav-btn:disabled { border-color: #fff; opacity: 0.2; }
    .page-current { color: var(--accent); font-weight: 700; font-size: 0.85rem; }

    /* SEARCH BAR */
    .search-input { width: 100%; max-width: 380px; height: 42px; background: rgba(15,15,15,0.6); border: 1px solid var(--white-trans); border-radius: 11px; padding: 0 18px; color: #fff; font-size: 0.8rem; outline: none; margin: 20px auto 0; display: block; backdrop-filter: blur(5px); }

    /* GRID & CARD */
    .feed{ margin-top:25px; display:grid; grid-template-columns:repeat(2,1fr); gap:10px; align-items: start; }
    .card{ background: transparent; padding:8px; border-radius:16px; border:1px solid var(--white-trans); cursor: pointer; transition: 0.3s; }
    .card:hover { border-color: var(--accent-trans); transform: translateY(-2px); }
    .card img { width: 100%; aspect-ratio: 3/4; object-fit: cover; border-radius: 11px; opacity: 0.9; }
    .card-title{ font-size:0.65rem; font-weight:700; color:#fff; text-transform:uppercase; margin-top:10px; line-height: 1.4; }
    .card-price-box { border: 1px solid var(--accent-trans); padding: 4px 9px; border-radius: 5px; margin-top: 8px; align-self: flex-start; background: rgba(223, 255, 46, 0.05); }
    .card-price { color: var(--accent); font-size: 0.6rem; font-weight: 700; font-family: monospace; }

    /* FOOTER */
    footer { margin-top: 40px; padding: 20px 0; text-align: center; color: #151515; font-size: 0.6rem; border-top: 1px solid #0a0a0a; font-family: 'Syncopate'; }

    /* MODAL */
    #overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:9999; justify-content:center; align-items:center; padding:20px; backdrop-filter: blur(12px); opacity:0; transition:0.3s; }
    #overlay.show { opacity: 1; }
    .full-card { background: #000; width: 100%; max-width: 270px; padding: 22px; border-radius: 24px; border: 1px solid var(--white-trans); transform: scale(0.9); transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    #overlay.show .full-card { transform: scale(1); }
    .full-img { width: 100%; aspect-ratio: 3/4; object-fit: cover; border-radius: 14px; margin-bottom: 12px; }
    .view-btn { width:100%; height:42px; background:var(--accent); color:#000; font-weight:800; border:none; border-radius:10px; cursor:pointer; font-size: 0.7rem; font-family: 'Syncopate'; }
</style>
</head>
<body onclick="dismissOverlay(event)">

<div class="bg-container"><div class="bg-dots"></div><div class="bg-gradient"></div><div class="bg-x-grid"></div></div>

<div class="container">
    <div class="hero">
        <div class="hero-top">PROMPT</div>
        <div class="hero-mid"><div class="hero-line"></div><span>BY</span><div class="hero-line"></div></div>
        <div class="hero-bot">NOTHING</div>
        <div class="hero-sub">AI IMAGE GENERATION</div>

        <!-- RESTORED BOXED DUAL NAV -->
        <div class="social-area-container">
            <div class="social-box">
                <span>SOSMED: <a href="https://www.tiktok.com/@nothxie?_r=1&_t=ZS-96H0tpV7FFI" target="_blank" class="social-link">TIKTOK</a></span>
                <span class="social-divider">|</span>
                <span>JASA EDIT: <a href="https://wa.me/6285155296786" target="_blank" class="social-link">WHATSAPP</a></span>
            </div>
        </div>

        <div class="status-container">
            <div class="pagination">
                <button class="nav-btn" onclick="changePage(-1)" id="prevTop"><</button>
                <span class="page-current" id="pageDisplayTop">1</span>
                <button class="nav-btn" onclick="changePage(1)" id="nextTop">></button>
            </div>
        </div>
    </div>

    <input type="text" id="searchInput" class="search-input" placeholder="Search archive..." onkeyup="handleSearch()">
    
    <div id="feed" class="feed"></div>

    <div class="pagination" style="margin: 40px 0;">
        <button class="nav-btn" onclick="changePage(-1)" id="prevBot"><</button>
        <span class="page-current" id="pageDisplayBot">1</span>
        <button class="nav-btn" onclick="changePage(1)" id="nextBot">></button>
    </div>

    <footer>© NOTHING • AI CREATOR</footer>
</div>

<div id="overlay" onclick="closeOverlay()">
    <div class="full-card" onclick="event.stopPropagation()">
        <img id="m-img" class="full-img" src="">
        <div id="m-title" style="font-weight:800; font-size:0.9rem; text-transform:uppercase; margin-bottom:4px;"></div>
        <div class="card-price-box" style="margin-bottom:15px;"><div id="m-price" class="card-price"></div></div>
        <input type="text" id="m-input" placeholder="ENTER KEY" style="width:100%; height:38px; background:#0a0a0a; border:1px solid #1a1a1a; color:var(--accent); text-align:center; border-radius:10px; margin-bottom:8px; font-weight:700; outline:none; font-family:'Space Grotesk';">
        <button class="view-btn" id="m-btn" onclick="verifyKey()">COPY PROMPT</button>
        <button onclick="buyKey()" style="width:100%; height:32px; background:transparent; color:#444; border:1px solid var(--white-trans); border-radius:8px; cursor:pointer; font-size:0.6rem; font-weight:700; margin-top:8px; text-transform:uppercase; font-family:'Space Grotesk';">PURCHASE KEY</button>
    </div>
</div>

<script>
// Logic script tetap solid
const WA_NUMBER = "6285155296786"; const DATA_URL = "https://gist.githubusercontent.com/Nothing-Prompt/a15861e94f408c9d85c1b7f4c561c540/raw/19133568174164a36a01c8b4bd6956ee33cc6ecb/gistfile1.txt";
let allPrompts = [], filteredPrompts = [], currentPage = 1, itemsPerPage = 6, activeId = null;
async function loadData() { try { const res = await fetch(DATA_URL); const rawText = await res.text(); const blocks = rawText.split('###').map(b => b.trim()).filter(b => b); allPrompts = blocks.map((block, index) => { let d = { id: index, title: "No Title", img: "", key: "", price: "FREE", prompt: "" }; block.split('\n').forEach(l => { const c = l.trim(); if (/^judul:/i.test(c)) d.title = c.replace(/^judul:/i, '').trim(); if (/^link gambar:/i.test(c)) d.img = c.replace(/^link gambar:/i, '').trim(); if (/^harga:/i.test(c)) d.price = c.replace(/^harga:/i, '').trim(); if (/^key:/i.test(c)) d.key = c.replace(/^key:/i, '').trim(); if (/^teks-prompt:/i.test(c)) d.prompt = l.replace(/^teks-prompt:/i, '').trim(); }); return d; }); filteredPrompts = [...allPrompts]; updateUI(); } catch (e) { console.error(e); } }
function handleSearch() { filteredPrompts = allPrompts.filter(p => p.title.toLowerCase().includes(document.getElementById("searchInput").value.toLowerCase())); currentPage = 1; updateUI(); }
function updateUI() { const feed = document.getElementById("feed"); feed.innerHTML = ""; const start = (currentPage - 1) * itemsPerPage; filteredPrompts.slice(start, start + itemsPerPage).forEach(p => { feed.insertAdjacentHTML('beforeend', `<div class="card" onclick="openOverlay(${p.id})"><img src="${p.img}"><div class="card-title">${p.title}</div><div class="card-price-box"><div class="card-price">${p.price}</div></div></div>`); }); const totalPages = Math.ceil(filteredPrompts.length / itemsPerPage); document.getElementById("pageDisplayTop").innerText = currentPage; document.getElementById("pageDisplayBot").innerText = currentPage; const btns = [document.getElementById("prevTop"), document.getElementById("nextTop"), document.getElementById("prevBot"), document.getElementById("nextBot")]; btns[0].disabled = btns[2].disabled = (currentPage === 1); btns[1].disabled = btns[3].disabled = (currentPage === (totalPages || 1)); }
function openOverlay(id) { activeId = id; const p = allPrompts.find(x => x.id === id); document.getElementById('m-img').src = p.img; document.getElementById('m-title').innerText = p.title; document.getElementById('m-price').innerText = p.price; const btn = document.getElementById('m-btn'); btn.innerText = "COPY PROMPT"; btn.style.background = "var(--accent)"; document.getElementById('m-input').value = ""; document.getElementById('overlay').style.display = 'flex'; setTimeout(() => document.getElementById('overlay').classList.add('show'), 10); }
function closeOverlay() { document.getElementById('overlay').classList.remove('show'); setTimeout(() => document.getElementById('overlay').style.display = 'none', 300); }
function dismissOverlay(e) { if(e.target.id === 'overlay') closeOverlay(); }
function changePage(step) { currentPage += step; updateUI(); window.scrollTo({top: 0, behavior: 'smooth'}); }
function verifyKey() { const btn = document.getElementById('m-btn'), input = document.getElementById('m-input').value.trim(); if (input === allPrompts.find(x => x.id === activeId).key) { navigator.clipboard.writeText(allPrompts.find(x => x.id === activeId).prompt); btn.innerText = "✓ COPIED"; setTimeout(closeOverlay, 1500); } else { btn.innerText = "WRONG KEY!"; btn.style.background = "var(--error)"; setTimeout(() => { btn.innerText = "COPY PROMPT"; btn.style.background = "var(--accent)"; }, 1200); } }
function buyKey() { const p = allPrompts.find(x => x.id === activeId); window.open(`https://wa.me/${6285155296786}?text=Halo, beli key: ${p.title}`); }
loadData();
</script>
</body>
</html>
